<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BASE SIEGE — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#04080f;color:#e0e0e0;font-family:'Share Tech Mono',monospace;padding:20px;min-height:100vh;}
h1{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:5px;color:#ff4444;text-shadow:0 0 20px #ff444444;margin-bottom:4px;}
.subtitle{font-size:10px;color:#4a2a2a;letter-spacing:3px;margin-bottom:20px;}
.layout{display:grid;grid-template-columns:1fr 380px;gap:16px;max-width:1200px;margin:0 auto;}

/* Auth Gate */
#auth-gate{position:fixed;inset:0;background:#04080f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
#auth-gate.hidden{display:none;}
#auth-gate h2{font-family:'Orbitron',sans-serif;font-size:18px;color:#ff4444;letter-spacing:4px;margin-bottom:20px;}
#auth-gate .auth-box{background:#0a1020;border:1px solid #1a2a4a;padding:24px;border-radius:8px;width:340px;}
#auth-gate input{width:100%;background:#04090f;border:1px solid #1a2a4a;color:#e0e0e0;font-family:'Share Tech Mono',monospace;font-size:13px;padding:10px 12px;margin-bottom:10px;outline:none;}
#auth-gate input:focus{border-color:#ff4444;}
#auth-gate button{width:100%;background:#1a0808;border:1px solid #ff4444;color:#ff4444;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;padding:12px;cursor:pointer;transition:all .15s;}
#auth-gate button:hover{background:#ff4444;color:#04080f;}
#auth-gate .error{color:#ff4444;font-size:11px;margin-top:8px;min-height:16px;}

/* Player List */
.panel{background:#0a1020;border:1px solid #1a2a4a;border-radius:6px;padding:14px;margin-bottom:14px;}
.panel-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;color:#4a2a2a;border-bottom:1px solid #1a2a4a;padding-bottom:6px;margin-bottom:10px;}
.player-card{background:#060c18;border:1px solid #1a2a4a;border-radius:4px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative;}
.player-card:hover{border-color:#ff4444;}
.player-card.selected{border-color:#ff4444;background:#100818;box-shadow:0 0 12px #ff444422;}
.player-card .p-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.player-card .p-name{font-size:13px;font-weight:bold;color:#ff8844;}
.player-card .p-mode{font-size:9px;padding:2px 6px;border-radius:8px;letter-spacing:1px;}
.player-card .p-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.player-card .p-stat{text-align:center;}
.player-card .p-stat .label{font-size:8px;color:#4a6a8a;letter-spacing:1px;}
.player-card .p-stat .value{font-size:14px;font-weight:bold;}
.player-card .p-stat .value.gold{color:#ffd700;}
.player-card .p-stat .value.hp{color:#ff4444;}
.player-card .p-stat .value.wave{color:#00ccff;}
.player-card .p-stat .value.score{color:#aa88ff;}
.p-status{width:8px;height:8px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px #00ff88;display:inline-block;margin-right:6px;}
.p-status.dead{background:#ff4444;box-shadow:0 0 6px #ff4444;}
.player-card .p-extra{display:flex;gap:12px;margin-top:6px;font-size:9px;color:#4a6a8a;}
.no-players{text-align:center;color:#2a3a4a;font-size:12px;padding:20px;}

/* Command Panel */
.cmd-section{margin-bottom:12px;}
.cmd-section-title{font-size:9px;color:#4a3a2a;letter-spacing:2px;margin-bottom:6px;}
.cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.cmd-btn{background:#060c18;border:1px solid #1a2a4a;color:#8a6a4a;font-family:'Share Tech Mono',monospace;font-size:11px;padding:10px 8px;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:6px;border-radius:3px;}
.cmd-btn:hover:not(:disabled){border-color:#ff4444;color:#ff4444;background:#100808;}
.cmd-btn:disabled{opacity:.3;cursor:not-allowed;}
.cmd-btn .emoji{font-size:16px;}
.cmd-btn.danger{border-color:#ff222233;}.cmd-btn.danger:hover:not(:disabled){border-color:#ff2222;color:#ff2222;}
.cmd-btn.special{border-color:#ffd70033;}.cmd-btn.special:hover:not(:disabled){border-color:#ffd700;color:#ffd700;}
.cmd-input-row{display:flex;gap:6px;margin-bottom:6px;}
.cmd-input{flex:1;background:#04090f;border:1px solid #1a2a4a;color:#e0e0e0;font-family:'Share Tech Mono',monospace;font-size:12px;padding:8px;outline:none;border-radius:3px;}
.cmd-input:focus{border-color:#ff4444;}
.cmd-select{flex:1;background:#04090f;border:1px solid #1a2a4a;color:#e0e0e0;font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px;outline:none;border-radius:3px;}

/* Command Log */
.log-entry{font-size:10px;padding:4px 8px;border-bottom:1px solid #0e1628;display:flex;gap:8px;}
.log-entry .log-time{color:#2a4a6a;min-width:55px;}
.log-entry .log-cmd{color:#ff8844;}
.log-entry .log-target{color:#00ccff;}
.log-entry .log-value{color:#ffd700;}
#cmd-log{max-height:200px;overflow-y:auto;}

/* Connection Status */
.conn-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0a1020;border:1px solid #1a2a4a;border-radius:4px;margin-bottom:14px;font-size:11px;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#1a3a2a;transition:all .3s;}
.conn-dot.on{background:#00ff88;box-shadow:0 0 8px #00ff88;}
.conn-text{color:#4a6a8a;}.conn-text.on{color:#00ff88;}
.conn-count{margin-left:auto;color:#ffd700;font-weight:bold;}
</style>
</head>
<body>

<!-- Auth Gate -->
<div id="auth-gate">
  <h2>🛡️ ADMIN ACCESS</h2>
  <div class="auth-box">
    <input type="email" id="admin-email" placeholder="Admin email">
    <input type="password" id="admin-pass" placeholder="Password">
    <button id="admin-login-btn">AUTHENTICATE</button>
    <div class="error" id="auth-error"></div>
  </div>
</div>

<!-- Main Panel -->
<header>
  <h1>🛡️ BASE SIEGE ADMIN</h1>
  <div class="subtitle">REAL-TIME COMMAND CENTER</div>
</header>

<div class="conn-bar">
  <span class="conn-dot" id="conn-dot"></span>
  <span class="conn-text" id="conn-text">Connecting...</span>
  <span class="conn-count" id="conn-count"></span>
</div>

<div class="layout">
  <!-- Left: Player List -->
  <div>
    <div class="panel">
      <div class="panel-title">⚡ LIVE PLAYERS</div>
      <div id="player-list"><div class="no-players">Waiting for players...</div></div>
    </div>
  </div>

  <!-- Right: Commands -->
  <div>
    <div class="panel">
      <div class="panel-title">🎮 COMMANDS <span id="target-label" style="color:#ff4444;font-family:'Share Tech Mono';font-size:10px;letter-spacing:1px;margin-left:8px;">— select a player</span></div>

      <div class="cmd-section">
        <div class="cmd-section-title">SET VALUES</div>
        <div class="cmd-input-row">
          <input class="cmd-input" id="val-gold" type="number" placeholder="Gold">
          <button class="cmd-btn" onclick="sendCmd('set_gold',el('val-gold').value)" style="flex:0"><span class="emoji">💰</span> SET</button>
        </div>
        <div class="cmd-input-row">
          <input class="cmd-input" id="val-wave" type="number" placeholder="Wave">
          <button class="cmd-btn" onclick="sendCmd('set_wave',el('val-wave').value)" style="flex:0"><span class="emoji">🌊</span> SET</button>
        </div>
        <div class="cmd-input-row">
          <input class="cmd-input" id="val-score" type="number" placeholder="Score">
          <button class="cmd-btn" onclick="sendCmd('set_score',el('val-score').value)" style="flex:0"><span class="emoji">🏆</span> SET</button>
        </div>
        <div class="cmd-input-row">
          <input class="cmd-input" id="val-hp" type="number" placeholder="Base HP">
          <button class="cmd-btn" onclick="sendCmd('set_hp',el('val-hp').value)" style="flex:0"><span class="emoji">❤️</span> SET</button>
        </div>
        <div class="cmd-input-row">
          <input class="cmd-input" id="val-speed" type="number" placeholder="Speed (1-5)">
          <button class="cmd-btn" onclick="sendCmd('set_speed',el('val-speed').value)" style="flex:0"><span class="emoji">⏩</span> SET</button>
        </div>
        <div class="cmd-input-row">
          <select class="cmd-select" id="val-mode">
            <option value="easy">EASY</option>
            <option value="normal">NORMAL</option>
            <option value="hard">HARD</option>
            <option value="hardcore">HARDCORE</option>
            <option value="sandbox">SANDBOX</option>
          </select>
          <button class="cmd-btn" onclick="sendCmd('set_mode',el('val-mode').value)" style="flex:0"><span class="emoji">🎯</span> SET</button>
        </div>
      </div>

      <div class="cmd-section">
        <div class="cmd-section-title">SPAWN</div>
        <div class="cmd-input-row">
          <select class="cmd-select" id="val-boss">
            <option value="boss_normal">★ Normal Boss</option>
            <option value="boss_armor">★ Armor Boss</option>
            <option value="boss_robot">★ Robot Boss</option>
            <option value="boss_flying">★ Flying Boss</option>
            <option value="boss_commander">★ Commander Boss</option>
          </select>
          <button class="cmd-btn special" onclick="sendCmd('spawn_boss',el('val-boss').value)" style="flex:0"><span class="emoji">👾</span> SPAWN</button>
        </div>
        <div class="cmd-grid">
          <button class="cmd-btn special" onclick="sendCmd('spawn_king')"><span class="emoji">👑</span> SPAWN KING</button>
          <button class="cmd-btn" onclick="sendCmd('heal_base')"><span class="emoji">💚</span> HEAL BASE</button>
        </div>
      </div>

      <div class="cmd-section">
        <div class="cmd-section-title">🛸 ADMIN DRONE PAD</div>
        <div class="cmd-grid">
          <button class="cmd-btn special" onclick="sendCmd('give_drone_pad')" style="grid-column:span 2"><span class="emoji">🛸</span> GIVE DRONE PAD (auto-places near base)</button>
        </div>
        <div class="cmd-input-row" style="margin-top:6px">
          <select class="cmd-select" id="val-drone-path">
            <option value="A">Path A — SWARM (more drones, up to 10)</option>
            <option value="B">Path B — MULTI-ROLE (heal+attack+buff)</option>
          </select>
          <button class="cmd-btn special" onclick="sendCmd('upgrade_drone',el('val-drone-path').value)" style="flex:0"><span class="emoji">⬆</span> UPGRADE</button>
        </div>
      </div>

      <div class="cmd-section">
        <div class="cmd-section-title">DESTRUCTIVE</div>
        <div class="cmd-grid">
          <button class="cmd-btn danger" onclick="sendCmd('kill_enemies')"><span class="emoji">💀</span> KILL ENEMIES</button>
          <button class="cmd-btn danger" onclick="sendCmd('nuke')"><span class="emoji">☢️</span> NUKE ALL</button>
        </div>
      </div>

      <div class="cmd-section">
        <div class="cmd-section-title">TARGET</div>
        <div class="cmd-grid">
          <button class="cmd-btn" id="btn-target-sel" onclick="targetMode='selected';updateTargetUI()" style="border-color:#ff444466;color:#ff4444;">◉ SELECTED</button>
          <button class="cmd-btn" id="btn-target-all" onclick="targetMode='all';updateTargetUI()">◉ ALL PLAYERS</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">📋 COMMAND LOG</div>
      <div id="cmd-log"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://qzupfyqizurpkvifkmnn.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dXBmeXFpenVycGt2aWZrbW5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjEyNDYsImV4cCI6MjA5MTYzNzI0Nn0.fRfg6wAeCMteat6Jf9yNT__g-N97LFCnWqlSF9rg6jo';
const ADMIN_EMAIL='limziyuan87788790@gmail.com';
const RT_CHANNEL='base_siege_live';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

let currentUser=null;
let rtChannel=null;
let players={};
let selectedPlayerId=null;
let targetMode='selected';

function el(id){return document.getElementById(id);}

// ========= AUTH =========
el('admin-login-btn').addEventListener('click',async()=>{
  const email=el('admin-email').value.trim();
  const pass=el('admin-pass').value;
  el('auth-error').textContent='';
  if(!email||!pass){el('auth-error').textContent='Enter email and password';return;}
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){el('auth-error').textContent=error.message;return;}
  if(data.user.email!==ADMIN_EMAIL){
    el('auth-error').textContent='ACCESS DENIED — not an admin account';
    await sb.auth.signOut();return;
  }
  currentUser=data.user;
  el('auth-gate').classList.add('hidden');
  initRealtime();
});

// Check if already logged in
(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session&&session.user.email===ADMIN_EMAIL){
    currentUser=session.user;
    el('auth-gate').classList.add('hidden');
    initRealtime();
  }
})();

// ========= REALTIME =========
function refreshPresence(){
  if(!rtChannel) return;
  try{
    const state=rtChannel.presenceState();
    players={};
    for(const[key,presences] of Object.entries(state)){
      if(key.startsWith('admin_')) continue;
      if(!presences||!presences[0]) continue;
      const p=presences[0];
      players[key]={...p,id:key};
    }
    renderPlayers();
    updateConnStatus(true,Object.keys(players).length);
  }catch(err){console.warn('Presence refresh error:',err);}
}

function initRealtime(){
  // Clean up previous channel if any
  if(rtChannel){try{rtChannel.unsubscribe();}catch(e){}}
  
  rtChannel=sb.channel(RT_CHANNEL,{
    config:{presence:{key:'admin_'+currentUser.id}}
  });

  rtChannel.on('presence',{event:'sync'},()=>{
    refreshPresence();
  });
  
  rtChannel.on('presence',{event:'join'},()=>{
    refreshPresence();
  });
  
  rtChannel.on('presence',{event:'leave'},()=>{
    refreshPresence();
  });

  rtChannel.subscribe(async(status)=>{
    if(status==='SUBSCRIBED'){
      await rtChannel.track({admin:true,email:currentUser.email});
      updateConnStatus(true,0);
      // Poll presence every 2 seconds for reliability
      setInterval(refreshPresence, 2000);
      // Initial refresh after a short delay
      setTimeout(refreshPresence, 500);
      setTimeout(refreshPresence, 1500);
      console.log('[ADMIN] Channel subscribed, polling started');
    } else {
      console.log('[ADMIN] Channel status:', status);
    }
  });
}

function updateConnStatus(connected,count){
  el('conn-dot').className='conn-dot'+(connected?' on':'');
  el('conn-text').className='conn-text'+(connected?' on':'');
  el('conn-text').textContent=connected?'CONNECTED':'OFFLINE';
  el('conn-count').textContent=count>0?count+' player'+(count>1?'s':'')+' online':'';
}

// ========= PLAYER LIST =========
function renderPlayers(){
  const list=el('player-list');
  const pArr=Object.values(players);
  if(pArr.length===0){
    list.innerHTML='<div class="no-players">No players online</div>';
    return;
  }
  const modeColors={easy:'#00ff88',normal:'#ffcc00',hard:'#ff8800',hardcore:'#ff2244',sandbox:'#00eeff'};
  list.innerHTML=pArr.map(p=>{
    const sel=selectedPlayerId===p.id?'selected':'';
    const mc=modeColors[p.mode]||'#888';
    const status=p.gameOver?'dead':'';
    return '<div class="player-card '+sel+'" onclick="selectPlayer(\''+p.id+'\')" data-id="'+p.id+'">'+
      '<div class="p-header">'+
        '<div><span class="p-status '+status+'"></span><span class="p-name">'+esc(p.name||'Anonymous')+'</span></div>'+
        '<span class="p-mode" style="background:'+mc+'22;color:'+mc+';border:1px solid '+mc+'44">'+(p.mode||'?').toUpperCase()+'</span>'+
      '</div>'+
      '<div class="p-stats">'+
        '<div class="p-stat"><div class="label">GOLD</div><div class="value gold">'+(p.gold||0)+'</div></div>'+
        '<div class="p-stat"><div class="label">HP</div><div class="value hp">'+(p.hp||0)+'/'+(p.maxHp||0)+'</div></div>'+
        '<div class="p-stat"><div class="label">WAVE</div><div class="value wave">'+(p.wave||0)+'</div></div>'+
        '<div class="p-stat"><div class="label">SCORE</div><div class="value score">'+(p.score||0)+'</div></div>'+
      '</div>'+
      '<div class="p-extra">'+
        '<span>🗼 '+(p.towersCount||0)+' towers</span>'+
        '<span>👾 '+(p.enemiesCount||0)+' enemies</span>'+
        '<span>💀 '+(p.kills||0)+' kills</span>'+
        '<span>⏩ ×'+(p.speed||1)+'</span>'+
      '</div>'+
    '</div>';
  }).join('');
}

function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function selectPlayer(id){
  selectedPlayerId=id;
  renderPlayers();
  const p=players[id];
  el('target-label').textContent='— '+esc(p?p.name||'Anonymous':'?');
  targetMode='selected';
  updateTargetUI();
}

function updateTargetUI(){
  el('btn-target-sel').style.borderColor=targetMode==='selected'?'#ff4444':'#1a2a4a';
  el('btn-target-sel').style.color=targetMode==='selected'?'#ff4444':'#4a6a8a';
  el('btn-target-all').style.borderColor=targetMode==='all'?'#ff4444':'#1a2a4a';
  el('btn-target-all').style.color=targetMode==='all'?'#ff4444':'#4a6a8a';
}

// ========= COMMANDS =========
async function sendCmd(type,value){
  if(!rtChannel){alert('Not connected');return;}
  const target=targetMode==='all'?'all':selectedPlayerId;
  if(!target){alert('Select a player first or use ALL PLAYERS target');return;}

  const cmd={type,value:value||null,target,from:'admin',ts:Date.now()};
  await rtChannel.send({type:'broadcast',event:'admin_command',payload:cmd});

  // Log it
  const targetName=target==='all'?'ALL':esc((players[target]||{}).name||'?');
  addLog(type,targetName,value);
}

function addLog(cmd,target,value){
  const log=el('cmd-log');
  const now=new Date();
  const time=now.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const entry=document.createElement('div');
  entry.className='log-entry';
  entry.innerHTML='<span class="log-time">'+time+'</span>'+
    '<span class="log-cmd">'+cmd+'</span>'+
    '<span class="log-target">→ '+target+'</span>'+
    (value?'<span class="log-value">('+esc(String(value))+')</span>':'');
  log.prepend(entry);
  // Keep max 50 entries
  while(log.children.length>50) log.removeChild(log.lastChild);
}

updateTargetUI();
</script>
</body>
</html>
